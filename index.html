<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PRO100 - Démos konvertor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone--over { border-color: #2563eb; background-color: #eff6ff; }
        .sug-list { position: absolute; z-index: 100; width: 100%; background: white; border: 1px solid #ddd; max-height: 150px; overflow-y: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .sug-item { padding: 8px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .sug-item:hover { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 font-sans p-4">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black text-blue-800 tracking-tight text-center uppercase">PRO100 - Démos konvertor</h1>
            <div id="dbBadge" class="inline-block mt-2 px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full uppercase">Databáze nenahrána</div>
        </header>

        <div id="dropZone" class="bg-white border-4 border-dashed border-gray-300 rounded-3xl p-12 text-center transition-all cursor-pointer hover:border-blue-400 hover:bg-blue-50 mb-8 group">
            <input type="file" id="fileInput" class="hidden" accept=".csv">
            <div class="text-blue-500 mb-4 group-hover:scale-110 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                </svg>
            </div>
            <p class="text-xl font-bold text-gray-700 uppercase tracking-tight">Vyberte soubor</p>
            <p class="text-gray-500 mt-2">Klikněte sem nebo jednoduše <b>přetáhněte CSV soubor</b></p>
        </div>

        <div id="resultArea" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-slate-900 text-white p-4 rounded-xl shadow-lg">
                <div id="statusText" class="text-sm font-bold uppercase tracking-widest text-blue-400">Párování...</div>
                <button id="downloadBtn" class="bg-green-500 hover:bg-green-600 px-8 py-3 rounded-xl font-black uppercase tracking-wider transition shadow-lg text-center">Exportovat _demos.csv</button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 border-b text-gray-400 uppercase text-[10px] font-black tracking-widest text-center">
                        <tr>
                            <th class="p-4">Projekt (Materiál)</th>
                            <th class="p-4 w-16 text-center">Tl.</th>
                            <th class="p-4">Dílec</th>
                            <th class="p-4 w-72">Démos Kód</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let DB = [];
        let currentRows = [];
        let originalFileName = "projekt"; // Výchozí jméno

        // --- NAČTENÍ DATABÁZE ---
        async function loadDatabase() {
            const badge = document.getElementById('dbBadge');
            try {
                const response = await fetch('demos_db.json');
                if (!response.ok) throw new Error('Soubor nenalezen');
                DB = await response.json();
                DB.forEach(d => d.cleanName = clean(d.n));
                badge.innerText = `Databáze aktivní (${DB.length} položek)`;
                badge.className = "inline-block mt-2 px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full uppercase text-center";
            } catch (err) {
                console.error("Chyba DB:", err);
                badge.innerText = "Chyba: demos_db.json nenalezen";
            }
        }
        loadDatabase();

        const clean = (s) => String(s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const getDist = (a, b) => {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            let m = Array.from({ length: b.length + 1 }, (_, i) => [i]);
            for (let j = 0; j <= a.length; j++) m[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    m[i][j] = b[i-1] === a[j-1] ? m[i-1][j-1] : Math.min(m[i-1][j-1]+1, m[i][j-1]+1, m[i-1][j]+1);
                }
            }
            return m[b.length][a.length];
        };

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drop-zone--over');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) process(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => process(e.target.files[0]);

        function process(file) {
            // Uložíme si jméno souboru bez přípony
            originalFileName = file.name.replace(/\.[^/.]+$/, "");

            const reader = new FileReader();
            reader.readAsText(file, 'windows-1250');
            reader.onload = (e) => {
                const lines = e.target.result.split(/\r?\n/);
                currentRows = [];
                lines.forEach((line, idx) => {
                    const c = line.split(';');
                    if (c.length < 7) return;

                    const pMat = c[7]?.trim() || "";
                    const pThick = c[5]?.trim() || "";
                    const pTokens = clean(pMat).split(/[^a-z0-9]/).filter(x => x.length > 1);

                    let bestMatch = null, maxScore = 0;
                    DB.filter(d => d.t === pThick).forEach(d => {
                        let score = 0;
                        pTokens.forEach(pt => {
                            if (d.k.includes(pt)) score += 10;
                            else if (d.k.some(dt => getDist(pt, dt) <= 1)) score += 5;
                        });
                        if (score > maxScore) { maxScore = score; bestMatch = d; }
                    });

                    currentRows.push({
                        idx, code: (maxScore > 5) ? bestMatch.c : "",
                        name: c[0].trim(), l: c[1].trim(), w: c[3].trim(),
                        t: pThick, q: c[6].trim(), m: pMat
                    });
                });
                render();
            };
        }

        function render() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            let foundCount = 0;
            currentRows.sort((a,b) => (a.code === b.code ? 0 : a.code === "" ? -1 : 1));

            currentRows.forEach(r => {
                if (r.code) foundCount++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 text-gray-500 italic text-center">${r.m}</td>
                    <td class="p-4 font-mono font-bold text-center">${r.t}</td>
                    <td class="p-4 font-semibold text-slate-700 text-center">${r.name}</td>
                    <td class="p-4 relative">
                        <input type="text" value="${r.code}"
                            class="w-full px-3 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition-all ${r.code ? 'border-gray-200' : 'border-red-400 bg-red-50 font-bold'}"
                            oninput="suggest(this, ${r.idx})"
                            onblur="hideSug(${r.idx})">
                        <div id="sug-${r.idx}" class="sug-list hidden"></div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('statusText').innerText = `STAV: ${foundCount}/${currentRows.length} SPÁROVÁNO`;
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('dropZone').classList.add('hidden');
        }

        window.suggest = (input, idx) => {
            const val = clean(input.value);
            const sugDiv = document.getElementById(`sug-${idx}`);
            const item = currentRows.find(r => r.idx === idx);
            if (val.length < 2) { sugDiv.classList.add('hidden'); return; }
            const matches = DB.filter(d => d.t === item.t && d.cleanName.includes(val)).slice(0, 5);
            if (matches.length) {
                sugDiv.innerHTML = matches.map(m => `
                    <div class="sug-item" onmousedown="applySug(${idx}, '${m.c}')">
                        <b class="text-blue-600">${m.c}</b> <span class="text-gray-400">|</span> ${m.n}
                    </div>
                `).join('');
                sugDiv.classList.remove('hidden');
            } else { sugDiv.classList.add('hidden'); }
        };

        window.applySug = (idx, code) => {
            currentRows.find(r => r.idx === idx).code = code;
            render();
        };

        window.hideSug = (idx) => setTimeout(() => {
            const el = document.getElementById(`sug-${idx}`);
            if(el) el.classList.add('hidden');
        }, 200);

        // --- EXPORT S DYNAMICKÝM JMÉNEM ---
        document.getElementById('downloadBtn').onclick = () => {
            let csv = "\uFEFFKOD MATERIALU;NÁZEV;DÉLKA;ŠÍŘKA;POČET KS;MÁ LÉTA;HRANA PŘEDNÍ KOD;HRANA ZADNI KOD;HRANA LEVA KOD;HRANA PRAVA KOD;TUPLOVANÁ DESKA;POZNÁMKA\n";
            currentRows.forEach(r => {
                csv += `${r.code};${r.name};${r.l};${r.w};${r.q};;;;;;;${r.m}, ${r.t} mm\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // TADY SE GENERUJE JMÉNO S PŘÍPONOU _demos
            a.download = `${originalFileName}_demos.csv`;
            a.click();
        };
    </script>
</body>
</html>
