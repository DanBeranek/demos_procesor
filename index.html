<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démos Konvertor v3.0 | Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans text-slate-900">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl p-6 md:p-10 border border-slate-200">
        <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-100 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-800">Démos <span class="text-blue-600">Konvertor</span></h1>
                <p id="dbStatus" class="text-sm text-slate-400 font-medium mt-1 font-mono italic">Inicializace systému...</p>
            </div>
            <div id="mainUI" class="hidden items-center gap-4">
                <input type="file" id="csvFile" accept=".csv" class="text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                <button id="downloadBtn" class="hidden bg-slate-900 hover:bg-black text-white px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-widest transition-all shadow-lg active:scale-95">Uložit pro Démos</button>
            </div>
        </div>

        <div id="statsArea" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center text-white">
            <div class="bg-emerald-500 p-6 rounded-2xl shadow-md border-b-4 border-emerald-700">
                <span class="text-xs uppercase font-bold opacity-80">Spárováno</span>
                <b id="statOk" class="block text-4xl mt-1 font-mono">0</b>
            </div>
            <div class="bg-rose-500 p-6 rounded-2xl shadow-md border-b-4 border-rose-700">
                <span class="text-xs uppercase font-bold opacity-80">Nenalezeno</span>
                <b id="statMiss" class="block text-4xl mt-1 font-mono">0</b>
            </div>
            <div class="bg-slate-700 p-6 rounded-2xl shadow-md border-b-4 border-slate-900">
                <span class="text-xs uppercase font-bold opacity-80">Položek Celkem</span>
                <b id="statTotal" class="block text-4xl mt-1 font-mono">0</b>
            </div>
        </div>

        <div id="tableWrapper" class="hidden overflow-x-auto rounded-xl border border-slate-200 shadow-inner bg-slate-50/50">
            <table id="resultTable" class="w-full text-left border-collapse bg-white">
                <thead class="bg-slate-800 text-white text-[10px] font-black uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Kód Démos</th>
                        <th class="px-6 py-4">Dílec / Poznámka (PRO100)</th>
                        <th class="px-6 py-4 text-center">Tloušťka</th>
                        <th class="px-6 py-4 text-right">Stav</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        let DB = [];
        let exportRows = [];

        // 1. Načtení databáze
        fetch('demos_db.json')
            .then(r => r.json())
            .then(data => {
                DB = data.filter(i => i && (i.d || i.c));
                document.getElementById('dbStatus').innerText = `✅ Databáze připravena (${DB.length} položek)`;
                document.getElementById('mainUI').classList.replace('hidden', 'flex');
            })
            .catch(e => {
                document.getElementById('dbStatus').innerText = "❌ CHYBA: demos_db.json nenalezen!";
                document.getElementById('dbStatus').className = "text-red-500 font-bold italic";
            });

        // 2. Čtení CSV
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => processData(ev.target.result);
            reader.readAsText(file, 'windows-1250');
        });

        // 3. Zpracování dat
        function processData(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim().length > 10);
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';

            let ok = 0, miss = 0;
            exportRows = [];

            lines.forEach((line) => {
                const cols = line.split(';').map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length < 8) return;

                const pNameOrig = cols[0];
                const pNameUpper = pNameOrig.toUpperCase().replace(/_/g, " "); // Fix podtržítek
                const pW = cols[1];
                const pH = cols[3];
                const pT = cols[5];
                const pCount = parseInt(cols[6]) || 1;
                const pMat = cols[7];
                const matUpper = pMat.toUpperCase();

                // --- LOGIKA PŘEVODU (Dle zadání truhláře) ---
                let rawT = parseFloat(pT.replace(',', '.'));
                let targetT = Math.floor(rawT);
                let targetCat = "DTDL";
                let isTupl = "NE";

                // HDF / ZÁDA
                if (pNameUpper.includes("HDF") || pNameUpper.includes("ZADA") || targetT === 3) {
                    targetT = 3;
                    targetCat = "HDF";
                }
                // TUPL
                else if (pNameUpper.includes("TUPL") || targetT === 36) {
                    targetT = 18;
                    targetCat = "DTDL";
                    isTupl = "ANO";
                }
                // PRACOVNÍ DESKA
                else if (pNameUpper.includes("PRACOVNI") || pNameUpper.includes(" PD ")) {
                    targetCat = "PD";
                    targetT = 38;
                }
                // ZÁSTĚNA
                else if (pNameUpper.includes("ZASTENA")) {
                    targetCat = "ZASTENA";
                    targetT = 10;
                }

                // --- HLEDÁNÍ V DB ---
                // Pokus 1: Přesná kategorie i tloušťka
                let match = DB.find(item => {
                    const dCode = (item.d || "").toUpperCase();
                    const dId = (item.c || "").toUpperCase();
                    const dMatch = (dCode && matUpper.includes(dCode)) || (dId && matUpper.includes(dId));
                    return dMatch && parseInt(item.t) === targetT && item.cat === targetCat;
                });

                // Pokus 2: Fallback (jen tloušťka a dekor, když nesedí kategorie)
                if (!match) {
                    match = DB.find(item => {
                        const dCode = (item.d || "").toUpperCase();
                        const dId = (item.c || "").toUpperCase();
                        const dMatch = (dCode && matUpper.includes(dCode)) || (dId && matUpper.includes(dId));
                        return dMatch && parseInt(item.t) === targetT;
                    });
                }

                const poznamkaFinal = `${pMat}, ${pT}mm`;

                if (match) {
                    ok++;
                    addRowToTable(match, pNameOrig, pT, isTupl, poznamkaFinal);
                    // KOD;NÁZEV;DÉLKA;ŠÍŘKA;KS;LÉTA;H1;H2;H3;H4;TUPL;POZNÁMKA
                    exportRows.push([
                        match.c, pNameOrig, pW, pH, pCount, "", "", "", "", "", isTupl, poznamkaFinal
                    ]);
                } else {
                    miss++;
                    addErrorRowToTable(pNameOrig, pMat, pT, poznamkaFinal);
                }
            });

            // Aktualizace UI
            document.getElementById('statOk').innerText = ok;
            document.getElementById('statMiss').innerText = miss;
            document.getElementById('statTotal').innerText = ok + miss;
            document.getElementById('statsArea').classList.remove('hidden');
            document.getElementById('tableWrapper').classList.remove('hidden');
            document.getElementById('downloadBtn').classList.toggle('hidden', ok === 0);
        }

        // --- POMOCNÉ FUNKCE PRO VYKRESLENÍ ---

        function addRowToTable(match, pName, pT, isTupl, poznamka) {
            const tbody = document.querySelector('#resultTable tbody');
            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50 transition-colors cursor-default";
            tr.innerHTML = `
                <td class="px-6 py-4 font-mono font-bold text-blue-600">${match.c}</td>
                <td class="px-6 py-4">
                    <div class="text-sm font-bold text-slate-800">${pName}</div>
                    <div class="text-[10px] text-slate-400 italic">${poznamka}</div>
                </td>
                <td class="px-6 py-4 text-center font-mono text-xs text-slate-500">${pT} mm</td>
                <td class="px-6 py-4 text-right">
                    <span class="inline-block bg-emerald-100 text-emerald-700 px-3 py-1 rounded text-[9px] font-black uppercase tracking-widest border border-emerald-200">
                        ${isTupl === 'ANO' ? 'TUPL OK' : 'OK'}
                    </span>
                </td>
            `;
            tbody.appendChild(tr);
        }

        function addErrorRowToTable(pName, pMat, pT, poznamka) {
            const tbody = document.querySelector('#resultTable tbody');
            const tr = document.createElement('tr');
            tr.className = "bg-rose-50/50 hover:bg-rose-50 transition-colors cursor-default";
            tr.innerHTML = `
                <td class="px-6 py-4 text-rose-300 italic font-medium text-xs">Nenalezeno</td>
                <td class="px-6 py-4">
                    <div class="text-sm font-bold text-slate-400">${pName}</div>
                    <div class="text-[10px] text-rose-400 italic font-bold underline">${poznamka}</div>
                </td>
                <td class="px-6 py-4 text-center font-mono text-xs text-slate-300">${pT} mm</td>
                <td class="px-6 py-4 text-right text-white">
                    <span class="inline-block bg-rose-500 text-white px-3 py-1 rounded text-[9px] font-black uppercase tracking-widest shadow-sm">MISS</span>
                </td>
            `;
            tbody.appendChild(tr);
        }

        // --- EXPORT ---
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const header = "KOD MATERIALU;NÁZEV;DÉLKA;ŠÍŘKA;POČET KS;MÁ LÉTA;HRANA PŘEDNÍ KOD;HRANA ZADNI KOD;HRANA LEVA KOD;HRANA PRAVA KOD;TUPLOVANÁ DESKA;POZNÁMKA\n";
            let csv = header;
            exportRows.forEach(r => csv += r.join(';') + "\n");

            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `demos_export_${new Date().toLocaleDateString().replace(/\s/g, '')}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
